  <path d="M240 200 L440 200" stroke="#5A3E2A" stroke-width="1.2" fill="none" opacity="0.8" style="fill:none;stroke:rgb(90, 62, 42);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M240 200 L290 155" stroke="#6A4E3A" stroke-width="1" fill="none" opacity="0.7" style="fill:none;stroke:rgb(106, 78, 58);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M290 155 L490 155" stroke="#7A5E4A" stroke-width="1" fill="none" opacity="0.6" style="fill:none;stroke:rgb(122, 94, 74);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Word "BRIKET" -->
  <text x="340" y="372" text-anchor="middle" font-family="var(--font-sans)" font-size="22" font-weight="500" fill="var(--color-text-secondary)" letter-spacing="6" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:22px;font-weight:500;text-anchor:middle;dominant-baseline:auto">BRIKET</text>
</svg>