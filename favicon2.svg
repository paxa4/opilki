<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brik-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="100%" stop-color="#2E2017"/>
    </linearGradient>
    <linearGradient id="brik-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1108"/>
      <stop offset="100%" stop-color="#2E2017"/>
    </linearGradient>
    <linearGradient id="brik-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2A1A"/>
      <stop offset="100%" stop-color="#241810"/>
