  <line x1="300" y1="195" x2="350" y2="160" stroke="#5A4030" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(90, 64, 48);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="195" x2="390" y2="160" stroke="#5A4030" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(90, 64, 48);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="380" y1="195" x2="430" y2="160" stroke="#5A4030" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(90, 64, 48);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="420" y1="195" x2="470" y2="160" stroke="#5A4030" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(90, 64, 48);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

